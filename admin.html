<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post It — 管理後台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="Post It 白板管理後台 — 使用者管理、資料統計、活動監控">
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Admin Styles -->
    <link rel="stylesheet" href="css/admin.css?v=2.7.6">
</head>
<body>

    <!-- ===== 未授權畫面 ===== -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>管理後台</h1>
            <p>僅限管理員存取</p>
            <button id="btn-admin-login" class="btn-admin-login">
                <i class="fa-brands fa-google"></i>
                <span>以管理員身份登入</span>
            </button>
            <p id="auth-error" class="auth-error hidden"></p>
            <a href="index.html" class="back-link">← 回到白板</a>
        </div>
    </div>

    <!-- ===== 管理後台主體 ===== -->
    <div id="admin-app" class="admin-app hidden">

        <!-- 頂部導航 -->
        <header class="admin-header">
            <div class="header-left">
                <i class="fa-solid fa-shield-halved"></i>
                <h1>Post It <span>Admin</span></h1>
            </div>
            <div class="header-right">
                <a href="index.html" class="btn-header" title="回到白板">
                    <i class="fa-solid fa-arrow-left"></i> 白板
                </a>
                <button id="btn-refresh" class="btn-header" title="重新整理">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <button id="btn-admin-logout" class="btn-header" title="登出">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <!-- 統計卡片 -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon users"><i class="fa-solid fa-users"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-users">—</span>
                    <span class="stat-label">註冊使用者</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon notes"><i class="fa-solid fa-note-sticky"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-notes">—</span>
                    <span class="stat-label">總貼紙數</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon images"><i class="fa-solid fa-image"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-images">—</span>
                    <span class="stat-label">圖片貼紙</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon storage"><i class="fa-solid fa-hard-drive"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="stat-storage">—</span>
                    <span class="stat-label">Firestore 文件數</span>
                </div>
            </div>
        </section>

        <!-- 使用者表格 -->
        <section class="panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-users"></i> 使用者列表</h2>
                <div class="panel-actions">
                    <input type="text" id="search-user" class="search-input" placeholder="搜尋使用者...">
                    <button id="btn-export-csv" class="btn-action" title="匯出 CSV">
                        <i class="fa-solid fa-file-csv"></i> 匯出
                    </button>
                </div>
            </div>
            <div class="table-wrap">
                <table id="users-table">
                    <thead>
                        <tr>
                            <th>頭像</th>
                            <th class="sortable" data-sort="name">名稱 <i class="fa-solid fa-sort"></i></th>
                            <th class="sortable" data-sort="email">Email <i class="fa-solid fa-sort"></i></th>
                            <th class="sortable" data-sort="notes">貼紙數 <i class="fa-solid fa-sort"></i></th>
                            <th class="sortable" data-sort="images">圖片 <i class="fa-solid fa-sort"></i></th>
                            <th>白板</th>
                            <th class="sortable" data-sort="lastActive">最近活動 <i class="fa-solid fa-sort"></i></th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="8" class="loading-cell"><i class="fa-solid fa-spinner fa-spin"></i> 載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 最近活動 -->
        <section class="panel">
            <div class="panel-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> 最近活動</h2>
            </div>
            <div id="activity-feed" class="activity-feed">
                <div class="loading-cell"><i class="fa-solid fa-spinner fa-spin"></i> 載入中...</div>
            </div>
        </section>

        <!-- ===== 使用者詳情 Modal ===== -->
        <div id="user-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-user-info">
                        <img id="modal-avatar" src="" alt="avatar">
                        <div>
                            <h3 id="modal-name"></h3>
                            <p id="modal-email"></p>
                        </div>
                    </div>
                    <button id="btn-close-modal" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="modal-body">
                    <div class="modal-stats">
                        <span id="modal-note-count"></span>
                        <span id="modal-image-count"></span>
                        <span id="modal-url-count"></span>
                    </div>
                    <div id="modal-notes" class="modal-notes-grid">
                        <!-- 動態填入 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <!-- Admin Script -->
    <script src="js/firebase-config.js?v=2.7.6"></script>
    <script src="js/admin.js?v=2.7.6"></script>
</body>
</html>
