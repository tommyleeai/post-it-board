<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Scroll Test Demo</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #e8e4df;
            padding: 50px;
            display: flex;
            justify-content: center;
        }
        /* Override absolute positioning for demo */
        .sticky-note {
            position: relative !important;
            margin: 20px;
            background-color: var(--note-yellow);
        }
    </style>
</head>
<body>
    <div class="sticky-note">
        <div class="note-tape" style="width: 80px; left: 50%; transform: translateX(-50%) rotate(-3deg);"></div>
        <div class="note-content">
在天願做比翼鳥，大難臨頭各自飛<br>
有朋自遠方來，鞭數十，驅之別院<br>
有朋自遠方來,非奸即盜<br>
少小離家老大回，安能辨我是雌雄？<br>
垂死病中驚坐起<br>
笑問客從何處來<br>
兩情若是長久時，又豈在界門綱目<br>
己所不欲，推己及人<br>
忍一時風平浪靜 退一步越想越氣<br>
天若有情天亦老，人若多情死的早<br>
不聽老人言，開心一整年<br>
退一萬步來說，一萬步我真的走不動<br>
<br>
這是一些額外的文字，用來確認捲軸是否真的能夠正常運作。<br>
當文字超越邊界的時候，就可以正常捲動，也不會看到醜醜的預設捲軸。
        </div>
    </div>
</body>
</html>
