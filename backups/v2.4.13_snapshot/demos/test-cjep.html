<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJEP (ChatJimmy) 連線測試工具</title>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0; padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #1565C0; font-size: 24px; }
        .step {
            background: #e3f2fd; padding: 15px; border-left: 5px solid #1976D2; border-radius: 4px; margin-bottom: 20px;
        }
        input, textarea {
            width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 20px;
            border: 1px solid #ccc; border-radius: 4px; font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #2e7d32; color: white; border: none; padding: 12px 20px;
            font-size: 16px; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #1b5e20; }
        #result {
            margin-top: 20px; padding: 15px; background: #263238; color: #aeea00;
            border-radius: 4px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace;
        }
        .error { color: #ff5252; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 CJEP (ChatJimmy) 連線測試</h1>
    
    <div class="step">
        這是一個極簡的網頁測試工具，讓您在沒有安裝其他 UI 的情況下，也能直接呼叫剛剛在背景跑起來的 CJEP 伺服器，體驗 Llama 3.1 8B 模型！
    </div>

    <label for="url">CJEP 伺服器網址</label>
    <input type="text" id="url" value="http://localhost:8880/v1/chat/completions" readonly />

    <label for="prompt">對話內容 (您可以隨意更改)</label>
    <textarea id="prompt" rows="3">請用一句話形容人工智慧。</textarea>

    <button onclick="testConnection()">🚀 送出對話</button>

    <div id="result">準備就緒，等待連線測試中...</div>
</div>

<script>
    async function testConnection() {
        const urlObj = document.getElementById('url').value;
        const promptObj = document.getElementById('prompt').value;
        const resultDiv = document.getElementById('result');

        resultDiv.innerHTML = '<span style="color: #fff">連線測試中，請稍候...</span>';
        
        const startTime = Date.now();

        try {
            const response = await fetch(urlObj, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer sk-ChatJimmyAICJ3P'
                },
                body: JSON.stringify({
                    model: "llama3.1-8B",
                    messages: [
                        { role: "user", content: promptObj }
                    ],
                    stream: false
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`伺服器錯誤: HTTP ${response.status}\n${errorText}`);
            }

            const data = await response.json();
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
            
            // OpenAI 格式的回傳值通常在 data.choices[0].message.content
            const answer = data.choices[0].message.content;
            
            // 改用 textContent 避免 HTML 標籤被瀏覽器當成真實網頁渲染出來
            resultDiv.textContent = `✅ 連線成功！解析耗時：${elapsed} 秒\n\nAI 回傳結果：\n${answer}`;
            
        } catch (err) {
            resultDiv.innerHTML = `<span class="error">❌ 連線失敗：${err.message}</span>`;
            console.error(err);
        }
    }
</script>

</body>
</html>
