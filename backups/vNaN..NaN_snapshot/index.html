<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post It — 你的數位白板</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="一個擬真的數位白板，用 3M 便利貼記錄你的靈感、網址、圖片。隨時隨地，打開就看到。">
    <meta property="og:title" content="Post It — 你的數位白板">
    <meta property="og:description" content="用擬真 3M 便利貼記錄一切。">
    <meta property="og:type" content="website">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Comic+Neue:wght@400;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css?v=8.58">
    <link rel="stylesheet" href="css/animations.css">
    <script>
        window.addEventListener('load', () => {
            setTimeout(async () => {
                if (window.PostIt && window.PostIt.Auth.getUid()) {
                    const db = window.PostIt.Firebase.getDb();
                    const doc = await db.collection('users').doc(window.PostIt.Auth.getUid()).get();
                    console.log('DEBUG_FIRESTORE_PAYLOAD:', doc.data()?.settings);
                    // document.title = doc.data()?.settings?.boardBgImage ? "HAS_BG" : "NO_BG";
                }
            }, 3000);
        });
    </script>
</head>
<body>

    <!-- ===== 登入畫面 ===== -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-note-sticky"></i>
            </div>
            <h1 class="login-title">Post It</h1>
            <p class="login-subtitle">你的數位白板，隨手記錄一切靈感</p>
            <button id="btn-google-login" class="btn-google-login">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>使用 Google 帳號登入</span>
            </button>
            <p class="login-footer">免費使用 · 資料安全儲存在雲端</p>
        </div>
    </div>

    <!-- ===== 主白板畫面 ===== -->
    <div id="app" class="app hidden">
        <!-- ===== 白板側邊欄 ===== -->
        <div id="mobile-sidebar-overlay" class="mobile-sidebar-overlay"></div>
        <nav id="board-sidebar" class="board-sidebar">
            <div class="sidebar-toggle" id="sidebar-toggle" title="展開/收合">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div class="sidebar-board-list" id="sidebar-board-list">
                <!-- 動態由 JS 產生白板項目 -->
            </div>
            <button class="sidebar-add-btn" id="sidebar-add-btn" title="新增白板">
                <i class="fa-solid fa-plus"></i>
                <span class="sidebar-label">新增白板</span>
            </button>
        </nav>
        <!-- 主內容區（工具列 + 白板） -->
        <div class="app-main">
        <!-- 頂部工具列 -->
        <header id="toolbar" class="toolbar">
            <div class="toolbar-left">
                <div class="toolbar-brand">
                    <i class="fa-solid fa-note-sticky"></i>
                    <span>Post It</span>
                    <span id="app-version" class="app-version" title="查看系統更新與版本紀錄">vNaN..NaN</span>
                </div>
            </div>
            <div class="toolbar-right">
                <button id="btn-view-archive" class="btn-toolbar" title="歷史歸檔">
                    <i class="fa-solid fa-box-archive"></i>
                </button>
                <button id="btn-account-settings" class="btn-toolbar" title="帳號設定">
                    <i class="fa-solid fa-sliders"></i>
                </button>
                <button id="btn-auto-sort" class="btn-toolbar" title="自動排列">
                    <i class="fa-solid fa-table-cells"></i>
                </button>
                <button id="btn-restore-pos" class="btn-toolbar hidden" title="還原位置">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <span id="note-count" class="note-count" title="貼紙數量">0 / 50</span>
                <div id="user-info" class="user-info">
                    <img id="user-avatar" class="user-avatar" src="" alt="avatar">
                    <span id="user-name" class="user-name"></span>
                </div>
                <button id="btn-logout" class="btn-logout" title="登出">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <!-- 手機專屬 Navigation Bar -->
        <div class="mobile-tab-bar" id="mobile-tab-bar">
            <!-- 手機版白板開關 -->
            <button id="mobile-sidebar-toggle" class="mobile-icon-btn" title="切換白板">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button class="mobile-tab-btn active" data-tab="all">全部</button>
            <button class="mobile-tab-btn" data-tab="text">文字</button>
            <button class="mobile-tab-btn" data-tab="image">圖片</button>
        </div>

        <!-- 白板區域 -->
        <main id="whiteboard" class="whiteboard">
            <!-- 貼紙會動態產生在這裡 -->

            <!-- 連線 SVG 覆蓋層 -->
            <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg"></svg>

            <!-- 空白板提示 -->
            <div id="empty-hint" class="empty-hint">
                <i class="fa-regular fa-note-sticky"></i>
                <p>白板空空的，點右下角 <strong>＋</strong> 新增你的第一張貼紙吧！</p>
            </div>
        </main>

        <!-- 右下角 FAB 群組 -->
        <div class="fab-group">

            <!-- 圖釘 FAB 按鈕 -->
            <button id="fab-pin" class="fab-pin" title="圖釘連線">
                <img src="assets/pin.png" alt="pin" class="fab-pin-img">
            </button>

            <!-- 印章 FAB 按鈕與左開選單 -->
            <div class="stamp-wrapper">
                <div id="stamp-menu" class="stamp-menu"></div>
                <button id="fab-stamp" class="fab-stamp" title="印章">
                    <i class="fa-solid fa-stamp"></i>
                </button>
            </div>

            <!-- 新增貼紙按鈕 (FAB) -->
            <button id="fab-add" class="fab-add" title="新增貼紙">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <!-- 自訂印章游標 -->
        <div id="stamp-cursor" class="stamp-cursor" style="display:none"></div>

        <!-- 自訂圖釘游標 -->
        <div id="pin-cursor" class="pin-cursor" style="display:none">
            <img src="assets/pin.png" alt="pin" class="cursor-pin-img">
        </div>

        <!-- ===== 貼紙設定面板 ===== -->
        <div id="note-settings" class="note-settings hidden">
            <div class="settings-header">
                <h3>貼紙設定</h3>
                <button id="btn-close-settings" class="btn-icon" title="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="settings-body">
                <!-- 顏色選擇 -->
                <div class="settings-section">
                    <label>貼紙顏色</label>
                    <div id="color-picker" class="color-picker">
                        <button class="color-swatch active" data-color="#FFF176" style="background:#FFF176" title="黃色"></button>
                        <button class="color-swatch" data-color="#F48FB1" style="background:#F48FB1" title="粉紅"></button>
                        <button class="color-swatch" data-color="#A5D6A7" style="background:#A5D6A7" title="綠色"></button>
                        <button class="color-swatch" data-color="#90CAF9" style="background:#90CAF9" title="藍色"></button>
                        <button class="color-swatch" data-color="#FFCC80" style="background:#FFCC80" title="橘色"></button>
                        <button class="color-swatch" data-color="#CE93D8" style="background:#CE93D8" title="紫色"></button>
                    </div>
                </div>
                <!-- 圖片上傳 -->
                <div class="settings-section">
                    <label>上傳圖片</label>
                    <button id="btn-upload-image" class="btn-upload">
                        <i class="fa-solid fa-image"></i>
                        <span>選擇圖片</span>
                    </button>
                    <input type="file" id="file-input" accept="image/*" style="display:none">
                </div>
                <!-- 單卡樣式設定 -->
                <div class="settings-section card-style-section">
                    <label>文字樣式（此卡專用）</label>
                    <div class="card-style-row">
                        <label>字型</label>
                        <select id="card-font-family">
                            <option value="">使用帳號預設</option>
                            <option value="Caveat">Caveat（手寫風）</option>
                            <option value="Noto Sans TC">Noto Sans TC（中文正黑）</option>
                            <option value="Inter">Inter（現代無襯線）</option>
                            <option value="Comic Neue">Comic Neue（漫畫風）</option>
                            <option value="Kalam">Kalam（手寫風）</option>
                        </select>
                    </div>
                    <div class="card-style-row">
                        <label>字體大小</label>
                        <input type="number" id="card-font-size" min="12" max="48" placeholder="預設">
                    </div>
                    <div class="card-style-row">
                        <label>字體顏色</label>
                        <input type="color" id="card-font-color" value="#000000">
                    </div>
                    <button id="btn-reset-card-style" class="btn-reset-card-style">
                        <i class="fa-solid fa-rotate-left"></i>
                        <span>重設為帳號預設</span>
                    </button>
                </div>
                <!-- 彩色流光效果 -->
                <div class="settings-section">
                    <button id="btn-rainbow" class="btn-rainbow">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>彩色流光效果</span>
                    </button>
                </div>
                <!-- 蓋章完成 -->

                <div class="settings-section">
                    <button id="btn-stamp-complete" class="btn-stamp">
                        <i class="fa-solid fa-stamp"></i>
                        <span>蓋章完成，歸檔</span>
                    </button>
                </div>
                <!-- 刪除 -->
                <div class="settings-section">
                    <button id="btn-delete-note" class="btn-delete">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>刪除這張貼紙</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== 貼紙設定面板背景遮罩 ===== -->
        <div id="settings-overlay" class="settings-overlay hidden"></div>

        <!-- ===== 帳號控制台 Modal ===== -->
        <div id="account-modal-overlay" class="account-modal-overlay"></div>
        <div id="account-modal" class="account-modal">
            <div class="account-modal-header">
                <h2><i class="fa-solid fa-sliders"></i> 帳號預設設定</h2>
                <button id="btn-close-account" class="btn-icon" title="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="account-modal-body">
                <!-- 字型 -->
                <div class="account-section">
                    <label>預設字型</label>
                    <select id="account-font-family">
                        <option value="Caveat">Caveat（手寫風）</option>
                        <option value="Noto Sans TC">Noto Sans TC（中文正黑）</option>
                        <option value="Inter">Inter（現代無襯線）</option>
                        <option value="Comic Neue">Comic Neue（漫畫風）</option>
                        <option value="Kalam">Kalam（手寫風）</option>
                    </select>
                </div>
                <!-- 字體大小 -->
                <div class="account-section">
                    <label>預設字體大小</label>
                    <div class="range-wrapper">
                        <input type="range" id="account-font-size" min="14" max="36" value="20">
                        <span id="account-font-size-value" class="range-value">20px</span>
                    </div>
                </div>
                <!-- 字體顏色 -->
                <div class="account-section">
                    <label>預設字體顏色</label>
                    <div class="font-color-picker">
                        <div class="font-color-swatches" id="font-color-swatches">
                            <!-- JS 動態產生 -->
                        </div>
                        <div class="font-color-custom">
                            <input type="color" id="account-font-color-custom" value="#000000" title="自訂顏色">
                        </div>
                    </div>
                </div>
                <!-- 預設貼紙顏色 -->
                <div class="account-section">
                    <label>預設貼紙顏色</label>
                    <div id="account-note-color" class="color-picker">
                        <button class="color-swatch" data-color="random" style="background: conic-gradient(from 0deg, #FFF176 0%, #F48FB1 20%, #CE93D8 40%, #90CAF9 60%, #A5D6A7 80%, #FFCC80 100%);" title="隨機"></button>
                        <button class="color-swatch" data-color="#FFF176" style="background:#FFF176" title="黃色"></button>
                        <button class="color-swatch" data-color="#F48FB1" style="background:#F48FB1" title="粉紅"></button>
                        <button class="color-swatch" data-color="#A5D6A7" style="background:#A5D6A7" title="綠色"></button>
                        <button class="color-swatch" data-color="#90CAF9" style="background:#90CAF9" title="藍色"></button>
                        <button class="color-swatch" data-color="#FFCC80" style="background:#FFCC80" title="橘色"></button>
                        <button class="color-swatch" data-color="#CE93D8" style="background:#CE93D8" title="紫色"></button>
                    </div>
                </div>
                <!-- AI 助手設定 -->
                <div class="account-section">
                    <label>Gemini API 金鑰（AI 提醒解析）</label>
                    <input type="password" id="account-ai-key" class="settings-input" placeholder="AIzaSy... (選填)">
                </div>
                <!-- 白板背景圖片設定 -->
                <div class="account-section">
                    <label>自訂白板背景（圖片網址）</label>
                    <div class="bg-settings-row" style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="account-bg-image-url" class="settings-input" placeholder="留空使用預設，也可貼上網址或上傳" style="flex: 1;">
                        <button id="btn-upload-bg-image" title="上傳自訂背景" style="padding: 10px 14px; border: 1px solid #ddd; background: #f8f9fa; border-radius: 8px; cursor: pointer; color: #555; transition: all 0.2s;">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                        </button>
                        <input type="file" id="bg-file-input" accept="image/*" style="display:none">
                    </div>
                </div>
                <!-- 預覽 -->
                <div class="settings-preview" id="settings-preview">
                    <span class="settings-preview-text" id="settings-preview-text">預覽文字效果 Preview</span>
                </div>
                <!-- 操作按鈕 -->
                <div class="account-modal-actions">
                    <button id="btn-save-account-settings" class="btn-save-settings">
                        <i class="fa-solid fa-check"></i> 儲存設定
                    </button>
                    <button id="btn-reset-account-settings" class="btn-reset-settings">
                        <i class="fa-solid fa-rotate-left"></i> 重設
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== 歷史歸檔 Archive Modal ===== -->
        <div id="archive-modal-overlay" class="account-modal-overlay"></div>
        <div id="archive-modal" class="account-modal archive-modal-container">
            <div class="account-modal-header">
                <h2><i class="fa-solid fa-box-archive"></i> 歷史歸檔區</h2>
                <button id="btn-close-archive" class="btn-icon" title="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="account-modal-body archive-modal-body">
                <div id="archive-grid" class="archive-grid">
                    <!-- 動態由 JS 產生迷你歷史卡片 -->
                    <div class="archive-empty-state">加載中...</div>
                </div>
            </div>
        </div>
        
        </div> <!-- /.app-main -->

        <!-- ===== 更新日誌 Changelog Modal ===== -->
        <div id="changelog-modal-overlay" class="account-modal-overlay"></div>
        <div id="changelog-modal" class="account-modal changelog-modal-container">
            <div class="account-modal-header">
                <h2><i class="fa-solid fa-bullhorn"></i> 系統更新日誌</h2>
                <button id="btn-close-changelog" class="btn-icon" title="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="account-modal-body changelog-modal-body">
                <div id="changelog-content" class="changelog-content">
                    <div class="loading-cell">載入中...</div>
                </div>
            </div>
        </div>

        <!-- ===== 白板管理 Modal ===== -->
        <div id="board-modal-overlay" class="account-modal-overlay"></div>
        <div id="board-modal" class="account-modal board-modal-container">
            <div class="account-modal-header">
                <h2 id="board-modal-title"><i class="fa-solid fa-chalkboard"></i> 新增白板</h2>
                <button id="btn-close-board-modal" class="btn-icon" title="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="account-modal-body">
                <div class="account-section">
                    <label>白板名稱</label>
                    <input type="text" id="board-name-input" class="settings-input" placeholder="例如：工作、學校、生活" maxlength="20">
                </div>
                <div class="account-section">
                    <label>圖示 (Emoji)</label>
                    <div class="board-icon-picker" id="board-icon-picker">
                        <button class="board-icon-option active" data-icon="📌">📌</button>
                        <button class="board-icon-option" data-icon="💼">💼</button>
                        <button class="board-icon-option" data-icon="🎓">🎓</button>
                        <button class="board-icon-option" data-icon="🏠">🏠</button>
                        <button class="board-icon-option" data-icon="🛒">🛒</button>
                        <button class="board-icon-option" data-icon="💡">💡</button>
                        <button class="board-icon-option" data-icon="🎯">🎯</button>
                        <button class="board-icon-option" data-icon="📋">📋</button>
                        <button class="board-icon-option" data-icon="❤️">❤️</button>
                        <button class="board-icon-option" data-icon="⭐">⭐</button>
                        <button class="board-icon-option" data-icon="🔥">🔥</button>
                        <button class="board-icon-option" data-icon="🎨">🎨</button>
                    </div>
                </div>
                <div class="account-section">
                    <label>主題色</label>
                    <div class="board-color-picker" id="board-color-picker">
                        <button class="board-color-option active" data-color="#4A90D9" style="background:#4A90D9"></button>
                        <button class="board-color-option" data-color="#e74c3c" style="background:#e74c3c"></button>
                        <button class="board-color-option" data-color="#2ecc71" style="background:#2ecc71"></button>
                        <button class="board-color-option" data-color="#f39c12" style="background:#f39c12"></button>
                        <button class="board-color-option" data-color="#9b59b6" style="background:#9b59b6"></button>
                        <button class="board-color-option" data-color="#1abc9c" style="background:#1abc9c"></button>
                        <button class="board-color-option" data-color="#e91e63" style="background:#e91e63"></button>
                        <button class="board-color-option" data-color="#607d8b" style="background:#607d8b"></button>
                    </div>
                </div>
                <div class="account-modal-actions">
                    <button id="btn-save-board" class="btn-save-settings">
                        <i class="fa-solid fa-check"></i> 確認
                    </button>
                    <button id="btn-delete-board" class="btn-reset-settings" style="display:none;color:var(--danger);border-color:var(--danger)">
                        <i class="fa-solid fa-trash-can"></i> 刪除白板
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js?v=2.1"></script>
    <script src="js/board.model.js?v=1.0"></script>
    <script src="js/auth.js?v=2.2"></script>
    <script src="js/drag.js?v=8.36"></script>
    <script src="js/settings_v2.js?v=2.5"></script>
    <script src="js/ai.js?v=2.1"></script>
    <script src="js/alarm.js?v=3.3"></script>
    <script src="js/note.js?v=8.38"></script>
    <script src="js/board_v2.js?v=8.38"></script>
    <script src="js/stamp_v2.js?v=2.3"></script>
    <script src="js/connect.js?v=2.5"></script>
    <script src="js/changelog.js?v=8.26"></script>
</body>
</html>
