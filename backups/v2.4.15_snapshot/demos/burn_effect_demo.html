<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燃燒化為灰燼特效 Demo</title>
    <style>
        /* CSS reset & base */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #2c2c2c 0%, #111 100%);
        }

        h2 {
            position: absolute;
            top: 20px;
            color: #888;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .container {
            position: relative;
        }

        /* 擬真的便利貼設計 */
        .sticky-note {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 100%);
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.4), 
                inset 0 0 20px rgba(255,255,255,0.4);
            border-bottom-right-radius: 40px 5px;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
            /* 讓它可以配合變形 */
            transform-origin: bottom center;
            transition: transform 0.1s;
        }

        /* 文字樣式 */
        .sticky-note h3 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: #bb2a00;
        }
        .sticky-note p {
            font-family: "Comic Sans MS", "Chalkboard SE", cursive, sans-serif; /* 營造手寫感 */
            line-height: 1.6;
            margin: 5px 0;
            font-size: 1.1rem;
        }

        /* 刪除按鈕 */
        .delete-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .delete-btn:hover {
            transform: scale(1.15) rotate(15deg);
            background: #ff6b81;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.6);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        /* 重新再來按鈕 - 預設隱藏 */
        #resetBtn {
            position: absolute;
            bottom: 40px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        #resetBtn.show {
            opacity: 1;
            pointer-events: auto;
        }

        #resetBtn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
        }

        /* 疊加在便利貼上方的 Canvas */
        canvas.burn-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
            /* 避免被 blur 影響 */
            filter: blur(0px) !important; 
        }

        /* 便利貼正在燃燒時的狀態 */
        .is-burning {
            filter: url(#charcoal); /* 稍微黑化的效果 */
        }
    </style>
</head>
<body>

<h2>點擊右上角火焰按鈕測試燃燒動畫</h2>

<!-- SVG 濾鏡讓紙張邊緣有點燒黑感 -->
<svg style="display:none;">
    <filter id="charcoal">
      <feColorMatrix type="matrix" values="
        0.5 0 0 0 0
        0 0.4 0 0 0
        0 0 0.3 0 0
        0 0 0 1 0" />
    </filter>
</svg>

<div class="container" id="note-container">
    <div class="sticky-note" id="note">
        <h3>🔥 新點子記錄</h3>
        <p>1. 整合超酷的物理引擎</p>
        <p>2. 加入碎紙機和灰燼特效</p>
        <p>3. 讓白板活起來！</p>
    </div>
    <button class="delete-btn" id="burnBtn" title="Permanently Delete">🔥</button>
</div>

<button id="resetBtn">🔄 重新產生卡片</button>

<script>
    const btn = document.getElementById('burnBtn');
    const note = document.getElementById('note');
    const container = document.getElementById('note-container');
    const resetBtn = document.getElementById('resetBtn');

    // 聽取按鈕點擊事件
    btn.addEventListener('click', () => {
        btn.style.display = 'none'; // 隱藏刪除鍵
        note.classList.add('is-burning');
        
        // 開始燃燒動畫
        burnElement(note, () => {
            console.log('燃燒完成');
            resetBtn.classList.add('show');
        });
    });

    // 重新設定按鈕
    resetBtn.addEventListener('click', () => {
        // 重設便利貼狀態
        note.style.clipPath = 'none';
        note.style.display = 'block';
        note.style.filter = '';
        note.classList.remove('is-burning');
        btn.style.display = 'flex';
        resetBtn.classList.remove('show');
    });

    /**
     * 燃燒核心函式
     * @param {HTMLElement} el 要燃燒的 DOM 元素
     * @param {Function} callback 燃燒完畢的回調
     */
    function burnElement(el, callback) {
        const rect = el.getBoundingClientRect();
        
        // 建立 Canvas 並覆蓋在元素上
        const canvas = document.createElement('canvas');
        canvas.className = 'burn-canvas';
        
        // 增加四周的 padding 讓灰燼有空間飛走
        const padding = 150; 
        canvas.width = rect.width + padding * 2;
        canvas.height = rect.height + padding * 2;
        canvas.style.left = `-${padding}px`;
        canvas.style.top = `-${padding}px`;
        
        // 將 Canvas 加到同一個容器中作相對定位
        el.parentElement.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        
        // 設定燃燒進度 (100% 由下往上變成 0%)
        let burnPercent = 100; 
        let particles = [];
        let animationId;
        
        // 產生合成的燃燒音效
        playFireCrackleSound();

        // 產生粒子的函式 (在此水平線上產生)
        function createParticles(yPercent) {
            // 計算 Canvas 中對應的 Y 坐標
            const burnLineY = padding + (rect.height * (yPercent / 100));
            
            // 每一幀產生約 15-20 顆粒子
            const particleCount = Math.floor(Math.random() * 8) + 12;
            for(let i=0; i<particleCount; i++) {
                const randType = Math.random();
                let type, color, size, vy, lifeDecay;
                
                if (randType > 0.6) {
                    // Type: 灰燼 (Ash)
                    type = 'ash';
                    color = Math.random() > 0.3 ? '#2f3542' : '#000000';
                    size = Math.random() * 4 + 2; // 較大塊
                    vy = (Math.random() * -3) - 1; // 往上飄落
                    lifeDecay = Math.random() * 0.01 + 0.005; // 存活較久
                } else if (randType > 0.2) {
                    // Type: 火焰 (Fire)
                    type = 'fire';
                    color = Math.random() > 0.4 ? '#ff4757' : '#ffa502';
                    size = Math.random() * 3 + 1; // 適中
                    vy = (Math.random() * -4) - 2; // 往上噴發
                    lifeDecay = Math.random() * 0.03 + 0.02; // 消失快
                } else {
                    // Type: 火星 (Spark)
                    type = 'spark';
                    color = '#ffeaa7';
                    size = Math.random() * 1.5 + 0.5; // 非常小
                    vy = (Math.random() * -6) - 3; // 噴最快
                    lifeDecay = Math.random() * 0.05 + 0.03; // 幾乎瞬間消失
                }

                particles.push({
                    type: type,
                    x: padding + (Math.random() * rect.width),
                    y: burnLineY + (Math.random() * 10 - 5), // 在燃燒線上微微上下浮動
                    vx: (Math.random() - 0.5) * 3, // 左右飄動 (風的干擾)
                    vy: vy,
                    size: size,
                    life: 1.0,  // 滿命
                    decay: lifeDecay,
                    color: color,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2
                });
            }
        }

        // 動畫主迴圈
        function updateAndDraw() {
            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 燃燒線推進速度
            burnPercent -= 0.65; 
            
            if (burnPercent > 0) {
                // 產生新的火焰與灰燼
                createParticles(burnPercent);
                
                // 【核心視覺】使用 clip-path 把已經「燒過」的下方隱藏起來
                // 這樣會產生實體紙張逐漸消失的錯覺
                el.style.clipPath = `polygon(0 0, 100% 0, 100% ${burnPercent}%, 0 ${burnPercent}%)`;
                
                // 讓紙張隨著燃燒稍微捲曲、變色（模擬高溫灼燒）
                // 加一點晃動感
                const wobble = Math.sin(burnPercent) * 2; 
                el.style.transform = `rotateX(${(100-burnPercent)/5}deg) rotateZ(${wobble}deg)`;
            } else {
                el.style.display = 'none'; // 燒完後將本體徹底隱藏
            }
            
            // 更新並繪製所有粒子
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                // 受到風力與重力影響 (微風向右吹)
                p.x += p.vx + 0.5; 
                p.y += p.vy;
                p.rotation += p.rotSpeed;
                p.life -= p.decay;
                
                // 火焰顏色變化：白/黃 -> 橘 -> 紅 -> 灰燼
                if (p.type === 'spark' && p.life < 0.5) p.color = '#ffa502';
                if (p.type === 'fire' && p.life < 0.6) p.color = '#ff4757';
                if (p.type === 'fire' && p.life < 0.2) {
                    p.type = 'ash';
                    p.color = '#57606f';
                }

                if (p.life <= 0) {
                    // 生命值歸零則刪除粒子
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    
                    // 灰燼畫成多邊形紙片，火星畫成圓點
                    if (p.type === 'ash') {
                        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    } else {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            }
            ctx.globalAlpha = 1.0;
            
            // 繪製紙張底部的「熾熱燃繞線」(Glowing burn edge)
            if (burnPercent > 0 && burnPercent < 100) {
                const burnLineY = padding + (rect.height * (burnPercent / 100));
                ctx.save();
                ctx.shadowBlur = 15 + Math.random()*10; // 閃爍的火光
                ctx.shadowColor = '#ff4757';
                ctx.fillStyle = '#ffa502'; // 高溫橙色
                
                // 畫一條崎嶇不平的火線
                ctx.beginPath();
                ctx.moveTo(padding, burnLineY);
                for(let lx = 0; lx <= rect.width; lx += 10) {
                    ctx.lineTo(padding + lx, burnLineY + (Math.random()*6-3));
                }
                ctx.lineTo(padding + rect.width, burnLineY - 4);
                ctx.lineTo(padding, burnLineY - 4);
                ctx.fill();
                ctx.restore();
            }
            
            // 判斷是否所有粒子都消失且燃燒完畢
            if (burnPercent <= 0 && particles.length === 0) {
                cancelAnimationFrame(animationId);
                canvas.remove(); // 清理畫布
                if (callback) callback();
            } else {
                animationId = requestAnimationFrame(updateAndDraw);
            }
        }

        // 啟動動畫
        animationId = requestAnimationFrame(updateAndDraw);
    }
    
    /**
     * Web Audio API 產生柴火燃燒、劈啪作響的合成音效
     * 純前端產生，不需要額外載入 mp3！
     */
    function playFireCrackleSound() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const audioCtx = new AudioContext();
            
            // 大約 2 秒的緩衝區
            const bufferSize = audioCtx.sampleRate * 2.5; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            // 產生白噪音與低頻嗡嗡聲
            for (let i = 0; i < bufferSize; i++) {
                // 漸弱的衰減封包 (Envelope)
                const decay = Math.exp(-i / (audioCtx.sampleRate * 1.0)); 
                
                // 基礎白噪音
                let noise = (Math.random() * 2 - 1); 
                
                // 隨機插入極高強度的爆裂聲 (Crackle)
                if (Math.random() < 0.0015) {
                    noise *= 15; // 峰值爆音
                }
                
                data[i] = noise * decay;
            }
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = buffer;
            
            // 用低通濾波器把太尖銳的電子雜音濾掉，留下溫暖的火焰聲
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200; // Hz
            
            // 控制音量
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
            // 慢慢淡出
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.4);
            
            noiseSource.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            noiseSource.start();
        } catch(e) {
            console.log("Audio not supported or auto-play blocked", e);
        }
    }
</script>
</body>
</html>
