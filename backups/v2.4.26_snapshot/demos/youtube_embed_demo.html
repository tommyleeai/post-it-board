<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 便利貼 Demo</title>
    <style>
        /* CSS reset & base */
        body { 
            background: #e9ecf3; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        h2 { 
            position: absolute; 
            top: 40px; 
            color: #4a5568; 
            font-weight: 600; 
        }

        .sticky-wrapper {
            position: relative;
            width: 280px;
            /* 支援平滑過渡 */
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 經典便利貼設計 */
        .sticky-note {
            width: 100%;
            min-height: 250px;
            background: #fdf2c8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-bottom-right-radius: 30px 5px; /* 右下角稍微翹起 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 萬一變成影片模式的樣式 (現代卡片設計) */
        .sticky-wrapper.is-video {
            width: 400px; /* 變寬以適應 16:9 */
        }
        
        .sticky-wrapper.is-video .sticky-note {
            background: #ffffff; /* 變成白底 */
            border-radius: 12px; /* 變成圓角卡片 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        /* 頂部拖曳把手區 */
        .header {
            height: 30px;
            background: rgba(0,0,0,0.03);
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            flex-shrink: 0;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }

        .sticky-wrapper.is-video .header {
            background: #f8f9fa;
            border-bottom: 1px solid #edf2f7;
        }

        /* 影片容器 (預設隱藏，設好高度比例) */
        .video-container {
            width: 100%;
            padding-top: 0; 
            position: relative;
            background: #000;
            transition: padding-top 0.4s ease;
            overflow: hidden;
            height: 0;
        }
        
        .sticky-wrapper.is-video .video-container {
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            height: auto;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s; /* 延遲顯示，等長高 */
        }

        .sticky-wrapper.is-video .video-container iframe {
            opacity: 1;
        }

        /* 文字輸入區 */
        .content {
            flex-grow: 1;
            padding: 20px;
            outline: none;
            font-size: 1rem;
            line-height: 1.6;
            color: #2d3748;
            white-space: pre-wrap; 
            overflow-y: auto;
            /* 讓 Youtube 連結變成藍色 */
            word-break: break-word;
        }

        .content[placeholder]:empty:before {
            content: attr(placeholder);
            color: #a0aec0;
            pointer-events: none;
        }

        /* 移除影片的按鈕 */
        #removeVideoBtn {
            display: none;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #a0aec0;
            padding: 4px;
            border-radius: 4px;
        }

        #removeVideoBtn:hover {
            background: #edf2f7;
            color: #e53e3e;
        }

        .sticky-wrapper.is-video #removeVideoBtn {
            display: block;
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            color: #718096;
            background: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 0.95rem;
        }
        
        .demo-link {
            color: #3182ce;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>貼入或點擊下方 YouTube 網址試試看！</h2>
    
    <div class="sticky-wrapper" id="wrapper">
        <div class="sticky-note" id="note">
            <div class="header">
                <span style="font-size: 12px; color: #a0aec0; font-weight: bold;">📌 新增筆記</span>
                <button id="removeVideoBtn" title="還原為純文字便利貼">✖ 移除影片</button>
            </div>
            <div class="video-container" id="videoWrapper">
                <!-- iframe 將會注入於此 -->
            </div>
            <div class="content" id="editor" contenteditable="true" placeholder="在這裡輸入文字，或是貼上 YouTube 網址 (系統會自動偵測並轉換)..."></div>
        </div>
    </div>
    
    <div class="instruction">
        👉 試著在便利貼裡隨便打字，然後貼上網址：<br><br>
        <span class="demo-link" onclick="injectLink('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">https://www.youtube.com/watch?v=dQw4w9WgXcQ</span> <br>
        <span class="demo-link" onclick="injectLink('https://youtu.be/jNQXAC9IVRw')">https://youtu.be/jNQXAC9IVRw</span>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const wrapper = document.getElementById('wrapper');
        const videoWrapper = document.getElementById('videoWrapper');
        const removeVideoBtn = document.getElementById('removeVideoBtn');
        
        let currentVideoId = null;

        // 優雅的 YouTube 網址正規表達式 (支援各種短網址與參數)
        const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;

        // 監聽輸入與貼上事件
        editor.addEventListener('input', checkContentForVideo);
        
        function injectLink(url) {
            editor.innerText += (editor.innerText.length > 0 ? '\n' : '') + url;
            checkContentForVideo();
        }

        function checkContentForVideo() {
            const text = editor.innerText;
            const match = text.match(ytRegex);
            
            if (match && match[1] && match[1] !== currentVideoId) {
                // 找到新的 YouTube ID 了！
                currentVideoId = match[1];
                
                // 稍微延遲一下，讓使用者感覺有「解析」的過程，體驗更好
                setTimeout(() => {
                    embedVideo(currentVideoId);
                }, 300);
            }
        }

        function embedVideo(id) {
            // 替換 iframe 內容
            videoWrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            
            // 觸發 CSS 動畫轉場，將便利貼撐寬並顯示影片區域
            wrapper.classList.add('is-video');
        }

        removeVideoBtn.addEventListener('click', () => {
             // 移除影片
             wrapper.classList.remove('is-video');
             
             // 等動畫結束後再清空 iframe (0.4s)
             setTimeout(() => {
                 videoWrapper.innerHTML = '';
                 currentVideoId = null;
             }, 400);
        });
    </script>
</body>
</html>
